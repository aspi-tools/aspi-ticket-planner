<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Ticket Planner — ASPI</title>
  <link rel="icon" href="assets/aspi-logo.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="app" class="min-h-screen">
    <header class="header-dark">
      <div class="max-w-5xl mx-auto px-5 py-4 flex items-center gap-4">
        <img src="assets/aspi-logo.png" alt="ASPI" class="aspi-logo h-12 sm:h-14 w-auto" />
        <span class="w-px h-9 bg-slate-700"></span>
        <div class="flex-1">
          <h1 class="text-lg sm:text-xl font-medium tracking-wide text-white leading-tight">Ticket Planner</h1>
          <p class="text-xs text-slate-400 mt-0.5">あなたのチケットを、これからどう使うか</p>
        </div>
        <span class="text-xs text-slate-500" id="version-tag">v0.4</span>
      </div>
    </header>

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
      <div class="max-w-5xl mx-auto px-4 py-3 grid grid-cols-2 gap-2">
        <button data-mode="A" class="mode-tab tab-active py-3 rounded-xl text-base font-medium border-2 transition">
          消化プラン
        </button>
        <button data-mode="B" class="mode-tab py-3 rounded-xl text-base font-medium border-2 transition">
          チケットの価値
        </button>
      </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-6 space-y-6">
      <!-- Mode A: 消化プラン -->
      <section id="mode-A" class="space-y-6">
        <div class="bg-white rounded-2xl shadow-sm p-5 space-y-4">
          <h2 class="text-base font-medium text-slate-600">入力</h2>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <label class="block">
              <span class="text-sm text-slate-600">現プラン</span>
              <select id="A-currentPlan" class="mt-1 w-full p-3 text-base rounded-lg border border-slate-300 bg-white"></select>
            </label>

            <label class="block">
              <span class="text-sm text-slate-600">残チケット</span>
              <div class="flex gap-2 mt-1">
                <input id="A-remaining" type="number" inputmode="numeric" min="0" step="30" value="0"
                       class="flex-1 p-3 text-base rounded-lg border border-slate-300" />
                <select id="A-remainingUnit" class="p-3 text-base rounded-lg border border-slate-300 bg-white">
                  <option value="min">分</option>
                  <option value="count">回</option>
                </select>
              </div>
              <p id="A-remainingHelp" class="mt-1 text-xs text-slate-500">1回 = 30分</p>
            </label>

            <label class="block">
              <span class="text-sm text-slate-600">手続き適用月</span>
              <div class="flex gap-2 mt-1">
                <select id="A-applyYear" class="flex-1 p-3 text-base rounded-lg border border-slate-300 bg-white"></select>
                <select id="A-applyMonth" class="flex-1 p-3 text-base rounded-lg border border-slate-300 bg-white"></select>
              </div>
              <p class="mt-1 text-xs text-slate-500">プラン切替を始める月</p>
            </label>

            <label class="block">
              <span class="text-sm text-slate-600">月あたり通うペース</span>
              <div class="flex gap-2 mt-1">
                <input id="A-paceValue" type="number" inputmode="numeric" min="0" step="30" value="360"
                       class="flex-1 p-3 text-base rounded-lg border border-slate-300" />
                <select id="A-paceUnit" class="p-3 text-base rounded-lg border border-slate-300 bg-white">
                  <option value="min">分</option>
                  <option value="count">回</option>
                </select>
              </div>
            </label>
          </div>

          <div>
            <span class="text-sm text-slate-600">手続き後プラン候補（最大3つ比較）</span>
            <div id="A-candidates" class="mt-2 grid grid-cols-3 sm:grid-cols-6 gap-2"></div>
          </div>
        </div>

        <div id="A-output" class="space-y-4">
          <div class="bg-white rounded-2xl shadow-sm p-5">
            <h2 class="text-base font-medium text-slate-600 mb-3">消化タイムライン</h2>
            <div class="relative w-full" style="height: 320px;">
              <canvas id="A-chart"></canvas>
            </div>
            <p class="mt-2 text-xs text-slate-500">縦軸: 残チケット（分）／横軸: 経過月（適用月＝0）</p>
          </div>

          <div id="A-cards" class="grid grid-cols-1 sm:grid-cols-3 gap-3"></div>
        </div>
      </section>

      <!-- Mode B: チケットの価値 -->
      <section id="mode-B" class="space-y-6 hidden">
        <div class="bg-white rounded-2xl shadow-sm p-5 space-y-4">
          <h2 class="text-base font-medium text-slate-600">入力</h2>

          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <label class="block">
              <span class="text-sm text-slate-600">会費区分</span>
              <select id="B-category" class="mt-1 w-full p-3 text-base rounded-lg border border-slate-300 bg-white"></select>
            </label>

            <label class="block">
              <span class="text-sm text-slate-600">現プラン</span>
              <select id="B-plan" class="mt-1 w-full p-3 text-base rounded-lg border border-slate-300 bg-white"></select>
            </label>

            <label class="block">
              <span class="text-sm text-slate-600">残チケット</span>
              <div class="flex gap-2 mt-1">
                <input id="B-remaining" type="number" inputmode="numeric" min="0" step="30" value="0"
                       class="flex-1 p-3 text-base rounded-lg border border-slate-300" />
                <select id="B-remainingUnit" class="p-3 text-base rounded-lg border border-slate-300 bg-white">
                  <option value="min">分</option>
                  <option value="count">回</option>
                </select>
              </div>
            </label>
          </div>
          <p id="B-feeNote" class="text-xs text-slate-500"></p>
        </div>

        <div id="B-output" class="space-y-4">
          <div class="rounded-2xl shadow p-8 text-center bg-gradient-to-br from-slate-700 to-slate-900 text-white">
            <p class="text-sm tracking-widest opacity-80">残っているチケットの価値</p>
            <p id="B-amount" class="text-6xl sm:text-7xl font-semibold my-3">¥0</p>
            <p id="B-breakdown" class="text-base opacity-90"></p>
          </div>

          <div class="text-center">
            <button id="B-toA" class="px-5 py-3 rounded-xl border-2 border-slate-400 text-slate-700 font-medium">
              この残量で消化計画を見る →
            </button>
          </div>
        </div>
      </section>
    </main>

    <footer class="max-w-5xl mx-auto px-4 py-6 text-center text-xs text-slate-400">
      ASPI Ticket Planner
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
